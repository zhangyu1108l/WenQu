# ============================================================
# WenQu kb-gateway Docker profile config
# ============================================================
# application-dev.yml is for local development and usually uses localhost.
# application-docker.yml is for Docker Compose: Redis is redis, and the
# downstream app target is http://app:8081.
#
# docker-compose.yml sets SPRING_PROFILES_ACTIVE=docker.
# Spring Boot then loads application-docker.yml and overrides application.yml.
# ============================================================

spring:
  # Docker difference from dev: Gateway still uses reactive Redis, but connects
  # through the redis service name inside the Docker network.
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms

# Docker difference from dev: JWT secret comes from env and must match kb-app.
jwt:
  secret: ${JWT_SECRET:}

# Docker difference from dev: route to app service name instead of localhost.
gateway:
  app-service-url: http://app:8081

# Same as application.yml: expose only health for Docker healthchecks.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Docker keeps INFO logs; dev profile enables DEBUG separately.
logging:
  level:
    root: INFO
    com.kb: INFO
