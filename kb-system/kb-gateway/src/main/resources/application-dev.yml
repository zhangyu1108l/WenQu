# ============================================================
# 问渠（WenQu）— kb-gateway 开发环境配置
# 所有敏感信息（密码、Secret）必须从环境变量读取，不要硬编码！
# ============================================================

spring:

  # ==========================================================
  # Redis 配置（Reactive）
  # Gateway 使用 ReactiveStringRedisTemplate 校验 JWT 黑名单
  # 必须使用 reactive 版本，因为 Gateway 基于 WebFlux（Netty），不能阻塞事件循环
  # 环境变量：
  #   REDIS_HOST     — Redis 主机地址，Docker 内为服务名 redis
  #   REDIS_PORT     — Redis 端口，默认 6379
  #   REDIS_PASSWORD — Redis 密码，从环境变量读取，不要硬编码
  # ==========================================================
  data:
    redis:
      host: ${REDIS_HOST:81.70.177.51}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms

# ==========================================================
# JWT 密钥配置
# 必须与 kb-app 的 jwt.secret 保持一致，否则 Gateway 无法解析 kb-app 签发的 token
# 环境变量：
#   JWT_SECRET — JWT 签名密钥（至少 256 位），从环境变量读取，不要硬编码
# ==========================================================
jwt:
  secret: ${JWT_SECRET:}

# ==========================================================
# 下游服务地址
# Docker 环境中为 http://app:8081（通过 Docker 服务名互访）
# 本地开发时覆盖为 localhost + 对应端口
# ==========================================================
gateway:
  app-service-url: ${APP_SERVICE_URL:http://localhost:8082}

# ==========================================================
# 开发环境日志：开启 DEBUG 日志便于调试 JWT 过滤器
# ==========================================================
logging:
  level:
    com.kb: DEBUG
    com.kb.gateway: DEBUG
