# ============================================================
# 问渠 kb-app Docker profile 配置
# ============================================================
# application-dev.yml 用于本地开发，通常使用 localhost。
# application-docker.yml 用于 Docker Compose，并使用以下服务名：
# mysql、redis、milvus、minio、parser 和 ragas-svc。
#
# docker-compose.yml 会设置 SPRING_PROFILES_ACTIVE=docker。
# 随后 Spring Boot 加载 application-docker.yml，并覆盖 application.yml 中的配置。
# ============================================================

server:
# 与开发环境差异：kb-app 监听内部端口 8081。
  port: 8081

spring:
# 与开发环境差异：使用 mysql 服务名。在容器中，
# localhost 会指向 app 容器自身。
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:kb_system}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:kb}
    password: ${MYSQL_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000

# 与开发环境差异：使用 redis 服务名，不使用 localhost。
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          min-idle: 5
          max-idle: 10
          max-active: 20

# 与开发环境差异：API Key 仍然来自环境变量。
# 修改后不需要重建镜像，重启容器即可。
  ai:
    openai:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.3
    deepseek:
      chat:
        model: deepseek-chat
        temperature: 0.3
        max-tokens: 2048

# 与开发环境差异：智谱 API Key 来自环境变量；模型和维度
# 按架构固定为 embedding-3 和 2048。
zhipu:
  embedding:
    base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    api-key: ${ZHIPU_API_KEY:}
    model: embedding-3
    dimensions: 2048

# 与开发环境差异：使用应用 MinIO 服务名 minio。
# 这是应用文档存储，不是 Milvus 内部的 milvus-minio。
minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:}
  presigned-expire-minutes: 15

# 与开发环境差异：使用 Milvus 服务名 milvus。
milvus:
  host: milvus
  port: 19530

# 与开发环境差异：JWT secret 来自环境变量，并且必须与 gateway 一致。
# JwtUtil 当前按毫秒读取 token TTL 值。
jwt:
  secret: ${JWT_SECRET:}
  access-token-expire: 3600000
  refresh-token-expire: 604800000

async:
  thread-pool:
    core-size: 4
    max-size: 16
    queue-capacity: 100
    thread-name-prefix: kb-async-

# 与开发环境差异：使用 parser 服务名，不使用 localhost。
parser:
  base-url: http://parser:8090

# 与开发环境差异：使用 ragas-svc 服务名，不使用 localhost。
ragas:
  base-url: http://ragas-svc:8091

# 与开发环境差异：Ragas 回调必须使用 Docker 内部地址 app:8081。
sidecar:
  eval-callback-url: http://app:8081/internal/eval/callback

# 与 application.yml 一致：仅暴露 health 端点用于 Docker 健康检查。
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Docker 环境保持 INFO 日志；dev profile 会单独启用 DEBUG。
logging:
  level:
    root: INFO
    com.kb: INFO
