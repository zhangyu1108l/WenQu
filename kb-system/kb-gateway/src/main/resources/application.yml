# ============================================================
# 问渠（WenQu）— kb-gateway 网关模块公共配置
# 此文件放环境无关的通用配置，敏感信息在 application-{profile}.yml 中
# ============================================================

# ---------- 服务端口 ----------
# kb-gateway 在 Docker 内部监听 8080，由 Nginx 反向代理对外暴露
server:
  port: 8080

# ---------- 激活的配置文件 ----------
spring:
  profiles:
    active: dev
  application:
    name: kb-gateway
  # 关闭 Gateway 默认路由发现（不用注册中心，路由在 GatewayConfig.java 中定义）
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

# ---------- 白名单路径 ----------
# 以下路径不需要 JWT 鉴权，JwtAuthFilter 直接放行
gateway:
  white-list:
    paths:
      - /api/auth/register
      - /api/auth/login

# ---------- 日志配置 ----------
logging:
  level:
    root: INFO
    com.kb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
