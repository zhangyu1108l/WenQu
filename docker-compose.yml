# ============================================================
# 问渠 WenQu Docker Compose - 完整 12 容器栈
#
# 依赖关系图：
#   基础层：mysql / redis / minio / milvus-etcd / milvus-minio
#     （基础层，并行启动）
#       |
#       +--> milvus（依赖 milvus-etcd + milvus-minio）
#       |
#   parser（无依赖）
#       |
#       v
#   app（依赖 mysql + redis + milvus + minio + parser）
#       |
#       +--> ragas-svc（依赖 app）
#       |
#       +--> gateway（依赖 app + redis）
#                |
#   frontend ----+--> nginx（依赖 gateway + frontend）
#
# depends_on 条件说明：
#   service_healthy 会等待依赖服务健康检查通过。
#   service_started 只等待依赖容器进程启动。
# ============================================================

services:
  # MySQL 存储租户、用户、文档、对话、任务和评估数据。
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    command:
      - --lower-case-table-names=1
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    # 健康检查：MySQL 能接受本地 root 连接后，mysqladmin ping 才会成功。
    # retries 设为 10，因为 MySQL 首次初始化和导入表结构可能较慢。
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kb-net

  # Redis 存储 JWT 黑名单和最近对话滑动窗口。
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes
        else
          redis-server --appendonly yes
        fi
    volumes:
      - redis-data:/data
    # 健康检查：Redis 返回 PONG 时 redis-cli ping 判定为健康。
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kb-net

  # MinIO 将上传的应用文档存入 tenant-{tenantId} Bucket。
  # 该应用 MinIO 与下方的 milvus-minio 相互独立。
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9001:9001" # 暴露控制台，便于开发时查看 Bucket。
    # 健康检查：MinIO 服务存活时 /minio/health/live 返回 HTTP 200。
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kb-net

  # Milvus etcd 存储 Milvus standalone 元数据，仅在 Docker 网络内使用。
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: ${ETCD_AUTO_COMPACTION_MODE}
      ETCD_AUTO_COMPACTION_RETENTION: ${ETCD_AUTO_COMPACTION_RETENTION}
      ETCD_QUOTA_BACKEND_BYTES: ${ETCD_QUOTA_BACKEND_BYTES}
      ETCD_SNAPSHOT_COUNT: ${ETCD_SNAPSHOT_COUNT}
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - milvus-etcd-data:/etcd
    networks:
      - kb-net

  # Milvus 内部 MinIO 存储 Milvus 对象数据，和应用 minio 服务完全独立。
  # 它使用固定的 minioadmin/minioadmin 凭据，与 Milvus 官方 standalone 示例一致，且不对外暴露。
  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    command: minio server /minio_data
    environment:
      MINIO_ACCESS_KEY: ${MILVUS_MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MILVUS_MINIO_SECRET_KEY}
    volumes:
      - milvus-minio-data:/minio_data
    # 健康检查：Milvus 内部对象存储存活时 /minio/health/live 返回 HTTP 200。
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kb-net

  # Milvus 存储并检索按租户隔离的文档向量。
  milvus:
    image: milvusdb/milvus:v2.4.5
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: ${MILVUS_ETCD_ENDPOINTS}
      MINIO_ADDRESS: ${MILVUS_MINIO_ADDRESS}
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      # 这里 etcd 使用 service_started 即可，因为 Milvus 启动时会自行重试连接。
      milvus-etcd:
        condition: service_started
      # service_healthy 会等待内部对象存储就绪探针通过。
      milvus-minio:
        condition: service_healthy
    # 健康检查：Milvus standalone 就绪后 /healthz 返回 HTTP 200。
    # retries 设为 10，因为 Milvus 启动通常较慢，常见约 30-60 秒。
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - kb-net

  # 解析侧车解析 PDF/DOCX 文件，并返回用于入库的智能分块。
  parser:
    build:
      context: ./kb-parser
    restart: unless-stopped
    # 健康检查：FastAPI 和解析依赖就绪时 /health 返回 HTTP 200。
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kb-net

  # Java app 提供认证、文档、对话、任务、管理、评估和 RAG 业务 API。
  app:
    build:
      context: ./kb-system
      dockerfile: kb-app/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: ${APP_SERVER_PORT}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_AI_OPENAI_BASE_URL: ${DEEPSEEK_BASE_URL}
      SPRING_AI_OPENAI_API_KEY: ${DEEPSEEK_API_KEY}
      SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL: ${DEEPSEEK_CHAT_MODEL}
      SPRING_AI_OPENAI_CHAT_OPTIONS_TEMPERATURE: ${DEEPSEEK_CHAT_TEMPERATURE}
      ZHIPU_EMBEDDING_BASE_URL: ${ZHIPU_BASE_URL}
      ZHIPU_EMBEDDING_API_KEY: ${ZHIPU_API_KEY}
      ZHIPU_EMBEDDING_MODEL: ${ZHIPU_EMBEDDING_MODEL}
      ZHIPU_EMBEDDING_DIMENSIONS: ${ZHIPU_EMBEDDING_DIMENSIONS}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MILVUS_HOST: ${MILVUS_HOST}
      MILVUS_PORT: ${MILVUS_PORT}
      PARSER_BASE_URL: ${PARSER_BASE_URL}
      RAGAS_BASE_URL: ${RAGAS_BASE_URL}
      SIDECAR_EVAL_CALLBACK_URL: ${EVAL_CALLBACK_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      # service_healthy 要求各中间件和侧车健康检查通过后再启动 app。
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
      parser:
        condition: service_healthy
    # 健康检查：Spring Boot 就绪时 /actuator/health 返回 HTTP 200。
    # start_period 为 Spring 容器预留预热时间，此期间失败不计入 retries。
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - kb-net

  # Ragas 侧车执行评估批次，并回调 Java app。
  ragas-svc:
    build:
      context: ./kb-ragas
    restart: unless-stopped
    environment:
      JAVA_APP_BASE_URL: ${JAVA_APP_BASE_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      ZHIPU_BASE_URL: ${ZHIPU_BASE_URL}
    depends_on:
      # service_healthy 确保 Java app 就绪前不会尝试回调。
      app:
        condition: service_healthy
    # 健康检查：FastAPI Ragas 服务就绪时 /health 返回 HTTP 200。
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kb-net

  # Gateway 校验 JWT、检查 Redis 黑名单、注入租户请求头并转发 API 流量。
  gateway:
    build:
      context: ./kb-system
      dockerfile: kb-gateway/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      GATEWAY_APP_SERVICE_URL: ${APP_SERVICE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      # service_healthy 会等待 API 后端和 Redis 黑名单存储可用。
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 健康检查：Spring Cloud Gateway 就绪时 /actuator/health 返回 HTTP 200。
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - kb-net

  # Frontend 通过内部 nginx 在 3000 端口提供构建后的 Vue 3 SPA。
  frontend:
    build:
      context: ./kb-frontend
    restart: unless-stopped
    # 健康检查：静态前端 nginx 正常提供 index.html 时 / 返回 HTTP 200。
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kb-net

  # 公共 nginx 是唯一外部入口，并反向代理 API、SSE 和前端流量。
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      # service_healthy 会等待 Gateway 能响应就绪检查。
      gateway:
        condition: service_healthy
      # service_started 只要求 frontend 容器进程已运行。
      frontend:
        condition: service_started
    # 健康检查：公共反向代理可用时 / 返回 HTTP 200。
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kb-net

# 所有服务加入 kb-net，并通过 Docker 服务名互访。
networks:
  kb-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  minio-data:
  milvus-etcd-data:
  milvus-minio-data:
  milvus-data:
